version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - node --version
        - npm ci
    build:
      commands:
        - npm run build:web
  artifacts:
    baseDirectory: apps/web/dist/web/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/web/.angular/cache/**/*
customRules:
  - source: '</^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>'
    target: /index.html
    status: '200'
